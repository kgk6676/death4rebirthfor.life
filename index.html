<!DOCTYPE html>
<html>
<head>
  <title>Death 4 Rebirth</title>

  <style>
    body {
      margin: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      max-width: 1200px;
      margin: auto;
      padding-top: 20px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      background: #eee;
      padding: 15px;
      border-radius: 10px;
      margin-right: 15px;
    }

    .profile {
      text-align: center;
    }

    .profile img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .profile-text {
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
    }

    .section {
      margin-top: 20px;
    }

    .section h3 {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    /* MAIN */
    .main {
      flex: 1;
    }

    .header {
      background: #ccc;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #666;
    }

    .post {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    /* MUSIC BOXES */
    .music-box {
      background: #111;
      color: white;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 20px;
    }

    .song-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #ff4d4d;
    }

    iframe {
      width: 100%;
      height: 180px;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="profile">
      <img src="logo.png">

      <div class="profile-text">
        <b>Author:</b> kale<br>
        welcome to rebirth!<br><br>
        dm to get ur photos or music posted!<br>
        <b>@kaleking6676</b>
      </div>
    </div>

    <div class="section">
      <h3>Latest Posts</h3>
      <p>Rebirth begins</p>
      <p>Destroy old self</p>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="post">

      <h2>Music</h2>

      <!-- SONG 1 -->

      </div>

      <!-- SONG 2 -->

        <iframe src="https://www.youtube.com/embed/NPgG9n_HpGc" allowfullscreen></iframe>
      </div>

    </div>

  </div>

</div>

</body>
</html>
