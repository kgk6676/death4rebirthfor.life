<!DOCTYPE html>
<html>
<head>
  <title>Death 4 Rebirth</title>

  <style>
    body {
      margin: 0;
      background: #d9d9d9;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      gap: 15px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #efefef;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    .sidebar img {
      width: 120px;
      margin-bottom: 10px;
    }

    .author {
      font-size: 13px;
      line-height: 1.5;
    }

    /* MAIN */
    .main {
      flex: 1;
    }

    .header {
      background: #c9c9c9;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #555;
    }

    .post {
      background: white;
      border-radius: 10px;
      padding: 15px;
    }

    /* MUSIC GRID */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 15px;
    }

    .music-card {
      background: #111;
      color: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .song-title {
      font-size: 12px;
      margin-bottom: 8px;
      color: #ff4d4d;
    }

    iframe {
      width: 100%;
      height: 120px;
      border-radius: 6px;
    }

    /* CD GIF */
    .cd-container {
      text-align: center;
      margin-top: 30px;
    }

    .cd-container img {
      width: 180px;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .music-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="logo.png">

    <div class="author">
      <b>Author:</b> kale<br>
      welcome to rebirth!<br><br>
      dm to get ur photos or music posted!<br>
      <b>@kaleking6676</b>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">DEATH-REBIRTH</div>

    <div class="post">

      <h2>Music</h2>

      <div class="music-grid">

        <div class="music-card">
          <div class="song-title">ghost girl - Lil Peep</div>
          <iframe src="https://www.youtube.com/embed/pcFK4HzAlsU"></iframe>
        </div>

        <div class="music-card">
          <div class="song-title">Impostor Syndrome - Sidney Gish</div>
          <iframe src="https://www.youtube.com/embed/H6ThrNMtoAI"></iframe>
        </div>

        <div class="music-card">
          <div class="song-title">A Promise Enclosed - Forgotten Alibi</div>
          <iframe src="https://www.youtube.com/embed/BKGS3IluLJY"></iframe>
        </div>

        <div class="music-card">
          <div class="song-title">Slow Down - Lucki</div>
          <iframe src="https://www.youtube.com/embed/NPgG9n_HpGc"></iframe>
        </div>

      </div>

      <!-- CD GIF -->
      <div class="cd-container">
        <img src="cd.gif">
      </div>

    </div>

  </div>

</div>

</body>
</html>
