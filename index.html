<!DOCTYPE html>
<html>
<head>
  <title>Death 4 Rebirth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d9d9d9;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      display: flex;
      max-width: 1150px;
      margin: auto;
      padding: 20px;
      gap: 15px;
      align-items: flex-start;
    }

    .sidebar {
      width: 260px;
      background: #efefef;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-sizing: border-box;
    }

    .datetime-box,
    .sidebar-section {
      background: #f8f8f8;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .datetime {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .sidebar img.logo {
      width: 120px;
      margin: 8px auto 10px;
      display: block;
    }

    .author {
      font-size: 13px;
      line-height: 1.5;
    }

    .section-title {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .side-list {
      font-size: 12px;
      line-height: 1.8;
      color: #444;
      text-align: left;
    }

    .side-list div,
    .side-list a {
      display: block;
      color: #444;
      text-decoration: none;
    }

    .side-list a:hover {
      color: #b30000;
    }

    .main {
      flex: 1;
    }

    .header {
      background: #c9c9c9;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #555;
      letter-spacing: 1px;
    }

    .post {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .post h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .meta {
      font-size: 11px;
      color: #777;
      margin-bottom: 10px;
    }

    .intro {
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }

    .featured-box {
      margin-top: 15px;
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
    }

    .featured-title {
      font-size: 14px;
      font-weight: bold;
      color: #b30000;
      margin-bottom: 6px;
    }

    .music-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 15px;
    }

    .music-card {
      background: #111;
      color: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .song-title {
      font-size: 12px;
      margin-bottom: 8px;
      color: #ff5c5c;
      font-weight: bold;
      min-height: 32px;
    }

    iframe {
      width: 100%;
      height: 120px;
      border-radius: 6px;
      border: 0;
    }

    .cd img {
      width: 110px;
      margin: 10px auto 0;
      display: block;
    }

    .song-note {
      margin-top: 8px;
      font-size: 11px;
      color: #d0d0d0;
    }

    /* 🔥 CAR SECTION */
    .car-intro {
      font-size: 13px;
      color: #444;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .car-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .car-card {
      background: #f4f4f4;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #ddd;
    }

    .car-card img {
      width: 100%;
      border-radius: 6px;
      display: block;
      filter: contrast(1.05) brightness(0.95) saturate(0.9);
    }

    .mini-posts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 15px;
    }

    .mini-card {
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 20px;
      padding: 15px;
    }

    @media (max-width: 950px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
      }
      .music-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .music-grid,
      .car-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="datetime-box">
      <div class="datetime" id="datetime"></div>
    </div>
  </div>

  <div class="main">

    <div class="header">DEATH-REBIRTH</div>

    <!-- MUSIC -->
    <div class="post">
      <h2>music</h2>
      <div class="music-grid">
        <!-- your existing music stays -->
      </div>
    </div>

    <!-- 🔥 NEW CAR SECTION -->
    <div class="post">
      <h2>car meet :)</h2>
      <div class="meta">dallas • shot on disposable film</div>

      <div class="car-intro">
        random shots from a late night meet. low light, grainy, imperfect — exactly how it felt.
      </div>

      <div class="car-grid">
        <div class="car-card">
          <img src="car1.jpg" alt="car meet photo 1">
        </div>

        <div class="car-card">
          <img src="car2.jpg" alt="car meet photo 2">
        </div>
      </div>
    </div>

  </div>

</div>

<script>
function updateDateTime() {
  const now = new Date();
  document.getElementById('datetime').innerHTML =
    now.toLocaleDateString() + "<br>" + now.toLocaleTimeString();
}
setInterval(updateDateTime, 1000);
updateDateTime();
</script>

</body>
</html>
